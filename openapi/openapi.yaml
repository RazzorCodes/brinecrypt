openapi: 3.0.3
info:
  title: Brinecrypt API
  description: |
    Brinecrypt is a secure resource management and encryption service designed to provide a centralized and secure way to store and manage sensitive configuration data, secrets, and other resources.

    ### Core Concepts

    *   **Resources:** Named entities stored within a **Namespace**. Resources can be of type `cleartext` (stored as is) or `encrypted` (transparently encrypted/decrypted).
    *   **Namespaces:** Logical groupings for resources. The `_` namespace is reserved for internal system resources like users.
    *   **Versions:** Every time a resource is updated via `PUT`, a new version is created. Brinecrypt maintains a history of all versions.
    *   **Principals:** Entities that can be granted permissions. These include **Users** and **Service Accounts** (SAs).
    *   **Permissions:** Granular access control based on a `ResourcePattern` (e.g., `prod/*`), a `Verb` (`list`, `read`, `write`, `delete`), and an optional expiry time.

    ### Authentication & Authorization

    Brinecrypt supports multiple authentication methods:
    1.  **Session Tokens:** Obtained via `/auth/login`. Used for interactive sessions.
    2.  **Personal Access Tokens (PATs):** Long-lived tokens issued by users for programmatic access.
    3.  **Capability Tokens:** Restricted tokens issued with a specific set of permissions, useful for delegation or narrow-scoped tasks.
    4.  **Service Account Tokens:** Integrated with Kubernetes for seamless authentication of workloads.
    5.  **Anonymous Tokens:** Short-lived capability tokens obtained via `/auth/anon` with no credentials required. The set of accessible resources is configured by an admin via `/admin/anon/permissions`.

    All API requests (except `/auth/login`, `/auth/refresh`, and `/auth/anon`) require a Bearer token in the `Authorization` header.

    ### Resource Patterns

    Permission `resource_pattern` fields support glob syntax within each path segment (namespace and name are separated by `/`). For example, `names-*/*-source` matches `names-pace/re-source` but not `namespace/r-source`. The wildcard `*` matches any sequence of characters within a single segment and does not cross `/` boundaries. The special pattern `*/*` matches all resources.

    ### Encryption

    When a resource is marked as `encrypted`, Brinecrypt automatically generates a unique Data Encryption Key (DEK) for each version. This DEK is used to encrypt the resource data using AES-256-GCM. The DEK itself is then encrypted using a Master Key Encryption Key (KEK) and stored alongside the resource version. Decryption happens transparently when a user with `read` permission retrieves the resource.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login to obtain session and refresh tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestBody'
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseBody'
        '400':
          description: Malformed input
        '401':
          description: Incorrect user or password

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh session token using a refresh token
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshSessionRequest'
      responses:
        '200':
          description: Successfully refreshed tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseBody'
        '400':
          description: Malformed input
        '401':
          description: Unauthorized or expired refresh token

  /auth/anon:
    post:
      tags:
        - Auth
      summary: Obtain a short-lived anonymous capability token
      description: |
        Issues a short-lived `cap_` bearer token scoped to the anonymous permissions configured by an admin. No credentials required. The token TTL defaults to 1 hour and can be overridden with the `ANON_TOKEN_TTL_SECONDS` environment variable. Returns 503 if no anonymous permissions have been configured.
      operationId: anonToken
      responses:
        '200':
          description: Anonymous token successfully issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnonTokenResponse'
        '503':
          description: Anonymous access not configured

  /auth/logout:
    delete:
      tags:
        - Auth
      summary: Logout and invalidate session token
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Successfully logged out
        '401':
          description: Unauthorized

  /api/v1/tokens/pat:
    post:
      tags:
        - Tokens
      summary: Issue a Personal Access Token (PAT)
      operationId: issuePAT
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssuePATRequest'
      responses:
        '200':
          description: PAT successfully issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Unauthorized

  /api/v1/tokens/pat/{id}:
    delete:
      tags:
        - Tokens
      summary: Revoke a PAT
      operationId: revokePAT
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '204':
          description: PAT successfully revoked
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: PAT not found

  /api/v1/tokens/capability:
    post:
      tags:
        - Tokens
      summary: Issue a Capability Token with specific permissions
      operationId: issueCapabilityToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCapabilityTokenRequest'
      responses:
        '200':
          description: Capability token successfully issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '400':
          description: Bad request
        '401':
          description: Unauthorized

  /api/v1/tokens/capability/{id}:
    delete:
      tags:
        - Tokens
      summary: Revoke a Capability Token
      operationId: revokeCapabilityToken
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '204':
          description: Capability token successfully revoked
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Token not found

  /admin/user:
    get:
      tags:
        - Admin
      summary: User/principal query endpoint (multi-mode)
      description: |
        Behaviour is controlled by the `op` query parameter:

        **No `op` (self-info):** Returns the permissions of the currently authenticated user. Only available to session and PAT callers (not capability tokens or service accounts). No additional permission required.

        **`?op=list`:** Lists all user names. Requires a session token with `_/users` list permission.

        **`?op=query`:** Returns permissions for a set of principals (users, service accounts, capability tokens, or PATs by ID). Requires a session token with `_/users` read permission. Request body must contain a `query` array where each entry is a discriminated object with exactly one of: `username`, `sa`+`namespace`, `cap_token` (integer ID), or `pat` (integer ID). PAT results include the PAT metadata, its owning user, and the user's current permissions (PATs inherit permissions dynamically at request time).
      operationId: adminUser
      security:
        - bearerAuth: []
      parameters:
        - name: op
          in: query
          required: false
          schema:
            type: string
            enum: [list, query]
          description: Operation mode. Omit for self-info.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserQueryRequest'
      responses:
        '200':
          description: |
            **No op:** `UserResponse` object for the calling user.

            **`?op=list`:** JSON array of username strings.

            **`?op=query`:** `{"results": {"user/<name>": {"permissions": [...]}, "sa/<ns>/<name>": {...}, "cap_token/<id>": {"permissions": [...], "expires_at": "..."}}}`
          content:
            application/json:
              schema:
                {}
        '400':
          description: Bad request (unknown op or invalid query body)
        '403':
          description: Forbidden
        '500':
          description: Internal server error
    post:
      tags:
        - Admin
      summary: Create a new user
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '204':
          description: User successfully created
        '400':
          description: Bad request
        '403':
          description: Forbidden (requires administrative privileges)
        '500':
          description: Internal server error

  /admin/user/{name}:
    delete:
      tags:
        - Admin
      summary: Delete user by name
      operationId: deleteUserByName
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User successfully deleted
        '403':
          description: Forbidden
        '500':
          description: Internal server error

  /admin/anon:
    get:
      tags:
        - Admin
      summary: Get anonymous access capabilities (public)
      description: |
        Returns the list of anonymous permissions that are issued to any caller of `/auth/anon`. This endpoint requires no authentication — the anonymous permission set is not considered secret information and is intended to be self-discoverable by unauthenticated clients.
      operationId: getAnonInfo
      responses:
        '200':
          description: List of anonymous permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnonPermission'
        '500':
          description: Internal server error

  /admin/permissions:
    post:
      tags:
        - Admin
      summary: Grant permissions to a principal (user or service account)
      operationId: grantPermissions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionsRequest'
      responses:
        '204':
          description: Permissions successfully granted
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Principal not found
    delete:
      tags:
        - Admin
      summary: Revoke permissions from a principal
      operationId: revokePermissions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionsRequest'
      responses:
        '204':
          description: Permissions successfully revoked
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Principal not found

  /admin/audit:
    get:
      tags:
        - Admin
      summary: Query audit logs
      description: Returns audit log entries filtered by any combination of actor, action, resource, status, and time range. Requires `_/users` read permission. Maximum 10 000 entries per response.
      operationId: getAuditLog
      security:
        - bearerAuth: []
      parameters:
        - name: actor
          in: query
          schema:
            type: string
          description: "Filter by actor (e.g. `user:alice`, `sa:ns/name`, `token:42`)"
        - name: action
          in: query
          schema:
            type: string
          description: "Filter by action (e.g. `resource.read`, `auth.login`, `auth.anon`)"
        - name: resource
          in: query
          schema:
            type: string
          description: Filter by resource target
        - name: status
          in: query
          schema:
            type: string
            enum: [ok, denied, error]
          description: Filter by outcome
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Return entries at or after this RFC3339 timestamp
        - name: until
          in: query
          schema:
            type: string
            format: date-time
          description: Return entries at or before this RFC3339 timestamp
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
          description: Maximum number of entries to return (default unbounded up to 10 000)
      responses:
        '200':
          description: Audit log entries matching the filter
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '400':
          description: Invalid query parameter
        '403':
          description: Forbidden
        '500':
          description: Internal server error

  /admin/principals:
    get:
      tags:
        - Admin
      summary: List or inspect service account principals
      description: |
        When called with an empty body (or no body), lists all known service accounts. Requires `_/sa` list permission.

        When called with a JSON body containing `{"principals": [{"namespace": "...", "name": "..."}]}`, returns the permissions for each named SA. Requires `_/sa` read permission.
      operationId: principals
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrincipalsRequest'
      responses:
        '200':
          description: |
            List mode: `{"principals": [{"namespace": "...", "name": "..."}]}`

            Detail mode: `{"principals": {"ns:name": {"permissions": [...]}}}`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalsResponse'
        '403':
          description: Forbidden
        '404':
          description: One or more principals not found
        '500':
          description: Internal server error

  /admin/anon/permissions:
    get:
      tags:
        - Admin
      summary: List anonymous permissions
      description: Returns all non-expired anonymous permissions that are issued to callers of `/auth/anon`.
      operationId: listAnonPermissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of anonymous permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnonPermission'
        '403':
          description: Forbidden
        '500':
          description: Internal server error
    post:
      tags:
        - Admin
      summary: Add anonymous permissions
      description: Adds one or more resource patterns to the anonymous permission set. Patterns support glob syntax (e.g. `names-*/*-source`). Bare `*` namespace and the reserved `_` namespace are not allowed.
      operationId: addAnonPermissions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PermissionEntry'
      responses:
        '204':
          description: Permissions successfully added
        '400':
          description: Bad request (invalid pattern or body)
        '403':
          description: Forbidden
        '500':
          description: Internal server error

  /admin/anon/permissions/{id}:
    delete:
      tags:
        - Admin
      summary: Delete an anonymous permission
      operationId: deleteAnonPermission
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        '204':
          description: Permission successfully deleted
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '500':
          description: Internal server error

  /api/v1/namespace:
    get:
      tags:
        - Resources
      summary: List namespaces accessible to the caller
      description: |
        Returns each namespace the caller has at least one non-expired permission on, along with
        the verbs available in that namespace. The result is the union of the caller's own permissions
        and the anonymous permission set. Unauthenticated callers receive only anon-covered namespaces.
        Namespaces granted only via glob patterns are excluded.
        Use `?op=list`.
      operationId: listNamespaces
      parameters:
        - name: op
          in: query
          required: true
          schema:
            type: string
            enum: [list]
      responses:
        '200':
          description: List of namespaces and their available verbs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NamespacePermissions'
        '400':
          description: Invalid op parameter
        '500':
          description: Internal server error
    post:
      tags:
        - Resources
      summary: List resources in a namespace
      description: |
        Returns all resources in the given namespace along with the namespace-level verbs the
        caller holds. Accessible to unauthenticated callers if the namespace is covered by the
        anonymous permission set.
        Use `?op=query`.
      operationId: queryNamespace
      parameters:
        - name: op
          in: query
          required: true
          schema:
            type: string
            enum: [query]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NamespaceQueryRequest'
      responses:
        '200':
          description: Namespace resources and caller verbs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NamespaceQueryResponse'
        '400':
          description: Invalid request body or op parameter
        '403':
          description: Forbidden
        '500':
          description: Internal server error

  /api/v1/resource:
    post:
      tags:
        - Resources
      summary: Query a resource or list its versions
      description: |
        Two modes selected by `?op=`:
        - `op=query`: Fetch a resource. Provide `namespace`+`name` for the latest version, add
          `version` (number, UUID, or `"latest"`) for a specific version, or provide `uuid` alone
          to fetch a specific version by its UUID directly.
        - `op=versions`: List all versions of a resource. Provide `namespace`+`name`.
        Accessible to unauthenticated callers if the resource is covered by the anonymous permission set.
      operationId: queryResource
      parameters:
        - name: op
          in: query
          required: true
          schema:
            type: string
            enum: [query, versions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceQueryRequest'
      responses:
        '200':
          description: Resource details or version list
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Resource'
                  - $ref: '#/components/schemas/ResourceValue'
                  - type: array
                    items:
                      $ref: '#/components/schemas/ResourceValueSummary'
        '400':
          description: Invalid request body or op parameter
        '403':
          description: Forbidden
        '404':
          description: Resource not found
        '500':
          description: Internal server error
    put:
      tags:
        - Resources
      summary: Create or update a resource
      description: |
        Creates or updates a resource. `type` is required on every write and is mutable —
        the latest successful write determines the resource's current type.
        Accessible to unauthenticated callers only if the anonymous permission set grants write on the resource.
      operationId: putResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutResourceRequest'
      responses:
        '204':
          description: Resource successfully created or updated
        '400':
          description: Invalid request body
        '403':
          description: Forbidden
        '500':
          description: Internal server error
    delete:
      tags:
        - Resources
      summary: Delete a resource
      operationId: deleteResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteResourceRequest'
      responses:
        '204':
          description: Resource successfully deleted
        '403':
          description: Forbidden
        '404':
          description: Resource not found
        '500':
          description: Internal server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Verb:
      type: string
      enum: [list, read, write, delete]
      description: Allowed operations on resources.

    ResourceType:
      type: string
      enum: [undefined, cleartext, encrypted]
      description: Type of resource data storage.

    EncryptionAlgorithm:
      type: string
      enum: [undefined, aes-256-gcm]
      description: Algorithm used to encrypt resource data.

    Namespace:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    AnonTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: Short-lived `cap_` bearer token scoped to the anonymous permissions.
          example: "cap_abc123..."
        expires_in:
          type: integer
          description: Token lifetime in seconds.
          example: 3600
      required:
        - token
        - expires_in

    AnonPermission:
      type: object
      properties:
        id:
          type: integer
        resource_pattern:
          type: string
          description: Glob-style pattern (e.g. `names-*/*-source`). Supports `*` within a segment.
          example: "prod/*-config"
        verb:
          $ref: '#/components/schemas/Verb'
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - id
        - resource_pattern
        - verb
        - created_at

    Permission:
      type: object
      properties:
        resource_pattern:
          type: string
          description: Glob-style pattern (e.g. `prod/*`, `names-*/*-source`). Supports `*` within a segment; `*/*` matches everything.
          example: "default/*"
        verb:
          $ref: '#/components/schemas/Verb'
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
      required:
        - resource_pattern
        - verb
        - created_at

    PermissionEntry:
      type: object
      properties:
        verb:
          $ref: '#/components/schemas/Verb'
        resource_pattern:
          type: string
          example: "default/my-secret"
        expires_at:
          type: string
          format: date-time
      required:
        - verb
        - resource_pattern

    Resource:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ResourceType'
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
        retired_at:
          type: string
          format: date-time
        namespace:
          $ref: '#/components/schemas/Namespace'
        value:
          $ref: '#/components/schemas/ResourceValue'
      required:
        - name
        - type
        - created_at
        - created_by

    ResourceValue:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        version:
          type: integer
        data:
          type: string
          description: The actual value content (decrypted if requested and authorized).
        encryption_algorithm:
          $ref: '#/components/schemas/EncryptionAlgorithm'
        encryption_key_id:
          type: integer
        encryption_key:
          $ref: '#/components/schemas/EncryptionKey'
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        retired_at:
          type: string
          format: date-time
      required:
        - uuid
        - version
        - data
        - encryption_algorithm
        - created_at

    EncryptionKey:
      type: object
      properties:
        encrypted_dek:
          type: string
        kek_version:
          type: integer
        created_at:
          type: string
          format: date-time
      required:
        - encrypted_dek
        - kek_version
        - created_at

    ResourceSummary:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/ResourceType'
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
        retired_at:
          type: string
          format: date-time
      required:
        - name
        - type
        - created_at
        - created_by

    ResourceValueSummary:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        version:
          type: integer
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        retired_at:
          type: string
          format: date-time
        encryption_algorithm:
          $ref: '#/components/schemas/EncryptionAlgorithm'
      required:
        - uuid
        - version
        - created_at
        - encryption_algorithm

    LoginRequestBody:
      type: object
      properties:
        user:
          type: string
        pass:
          type: string
      required:
        - user
        - pass

    LoginResponseBody:
      type: object
      properties:
        session_token:
          type: string
        refresh_token:
          type: string
      required:
        - session_token
        - refresh_token

    RefreshSessionRequest:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    IssuePATRequest:
      type: object
      properties:
        expiry:
          type: string
          format: date-time

    IssueCapabilityTokenRequest:
      type: object
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionEntry'
      required:
        - permissions

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        pass:
          type: string
      required:
        - name
        - pass

    PermissionsRequest:
      type: object
      properties:
        principal:
          type: string
          description: "Principal identifier (e.g., 'user:username' or 'sa:namespace:name')"
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionEntry'
      required:
        - principal
        - permissions

    UserResponse:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
      required:
        - name
        - email
        - created_at

    NamespacePermissions:
      type: object
      properties:
        namespace:
          type: string
        verbs:
          type: array
          items:
            $ref: '#/components/schemas/Verb'
      required:
        - namespace
        - verbs

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        actor:
          type: string
          description: "Initiator of the action (e.g. `user:alice`, `sa:ns/name`, `token:42`, `anon`)"
        action:
          type: string
          description: "Action performed (e.g. `resource.read`, `auth.login`, `auth.anon`)"
        resource:
          type: string
          description: Target resource or descriptor
        status:
          type: string
          enum: [ok, denied, error]
        remote_addr:
          type: string
      required:
        - id
        - created_at
        - actor
        - action
        - resource
        - status

    SARef:
      type: object
      properties:
        namespace:
          type: string
        name:
          type: string
      required:
        - namespace
        - name

    PrincipalsRequest:
      type: object
      properties:
        principals:
          type: array
          items:
            $ref: '#/components/schemas/SARef'
      required:
        - principals

    PrincipalsResponse:
      type: object
      properties:
        principals:
          description: "List mode: array of SARef. Detail mode: map of `namespace:name` → permissions object."
          oneOf:
            - type: array
              items:
                $ref: '#/components/schemas/SARef'
            - type: object
              additionalProperties:
                type: object
                properties:
                  permissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'

    AdminUserQueryEntry:
      type: object
      description: Discriminated union — set exactly one of username, sa+namespace, cap_token, or pat.
      properties:
        username:
          type: string
          description: Query a user by name.
        namespace:
          type: string
          description: Required when querying a service account.
        sa:
          type: string
          description: Service account name (requires namespace).
        cap_token:
          type: integer
          format: uint64
          description: Capability token ID.
        pat:
          type: integer
          format: uint64
          description: PAT ID. Returns the PAT metadata, its owning user, and the user's current permissions (PATs inherit permissions dynamically).

    AdminUserQueryRequest:
      type: object
      properties:
        query:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserQueryEntry'
      required:
        - query

    NamespaceQueryRequest:
      type: object
      properties:
        namespace:
          type: string
      required:
        - namespace

    NamespaceQueryResponse:
      type: object
      properties:
        namespace:
          type: string
        verbs:
          type: array
          items:
            $ref: '#/components/schemas/Verb'
        resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceSummary'

    ResourceQueryRequest:
      type: object
      description: |
        Discriminated union — provide one of:
        - `namespace` + `name` (optionally `version`: number, UUID string, or "latest")
        - `uuid` alone
      properties:
        namespace:
          type: string
        name:
          type: string
        version:
          type: string
          description: Version number, UUID, or "latest"
        uuid:
          type: string
          format: uuid

    PutResourceRequest:
      type: object
      properties:
        namespace:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/ResourceType'
        value:
          type: string
      required:
        - namespace
        - name
        - type
        - value

    DeleteResourceRequest:
      type: object
      properties:
        namespace:
          type: string
        name:
          type: string
      required:
        - namespace
        - name
