nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: zot.lan/brinecrypt
  tag: latest
  pullPolicy: Always

# Brinecrypt KEK — hex-encoded 32 bytes (64 chars). Set in values.local.yaml.
kek: ""

database:
  # Full postgres connection string for brinecrypt (DATABASE_URL env var).
  url: ""
  # Postgres admin URL pointing at the 'postgres' db — used only by the db-init Job.
  pgUrl: ""

# k8s namespace where ConfigMaps live (sa-permissions, admin-tokens).
# Defaults to the release namespace.
syncNamespace: ""

# SA permissions — desired state synced into brinecrypt-sa-permissions ConfigMap.
saPermissions:
  service_accounts: []

# Bootstrap admin tokens — hex strings, 32 bytes each. Set in values.local.yaml.
adminTokens: []

service:
  port: 8080

# CORS allowed origins. Empty = disabled. Use ["*"] or specific origin URLs.
corsOrigins: []

resources: {}
podAnnotations: {}
nodeSelector:
  kubernetes.io/arch: amd64
tolerations: []
affinity: {}

brinekey:
  enabled: true
  brinecryptUrl: ""
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  resources: {}
  podAnnotations: {}
  restrictTokenCreation: false
  tokenRequestNamespaces: []

ingress:
  enabled: true
  host: brinecrypt.lan
  entryPoints:
    - web
  middlewares: []
  tls: null

networkPolicy:
  enabled: false
  ingressFrom:
    - namespaceSelector: {}
  egress:
    - {}
