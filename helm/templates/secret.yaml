apiVersion: v1
kind: Secret
metadata:
  name: brinecrypt-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ required "values.database.url is required" .Values.database.url | quote }}
  kek: {{ required "values.kek is required (hex-encoded 32 bytes)" .Values.kek | quote }}
