{{- if .Values.brinekey.enabled }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: brinecryptsecrets.brinekey.brinecrypt.io
spec:
  group: brinekey.brinecrypt.io
  scope: Namespaced
  names:
    plural: brinecryptsecrets
    singular: brinecryptsecret
    kind: BrinecryptSecret
    shortNames:
      - bcs
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - remotePath
                - serviceAccount
                - targetSecret
              properties:
                remotePath:
                  type: string
                serviceAccount:
                  type: string
                targetSecret:
                  type: string
                secretKey:
                  type: string
                refreshInterval:
                  type: string
            status:
              type: object
              properties:
                ready:
                  type: boolean
                lastSyncTime:
                  type: string
                  format: date-time
                lastError:
                  type: string
{{- end }}
