apiVersion: v1
kind: Service
metadata:
  name: {{ include "brinecrypt.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "brinecrypt.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
