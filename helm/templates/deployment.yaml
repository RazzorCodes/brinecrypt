apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "brinecrypt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "brinecrypt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "brinecrypt.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "brinecrypt.fullname" . }}
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: brinecrypt
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: brinecrypt-secrets
                  key: database-url
            - name: BRINECRYPT_KEK
              valueFrom:
                secretKeyRef:
                  name: brinecrypt-secrets
                  key: kek
            - name: BRINECRYPT_SYNC_NAMESPACE
              value: {{ include "brinecrypt.syncNamespace" . | quote }}
            - name: BRINECRYPT_SYNC_CONFIGMAP
              value: brinecrypt-sa-permissions
            - name: BRINECRYPT_ADMIN_TOKENS_CONFIGMAP
              value: brinecrypt-admin-tokens
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
