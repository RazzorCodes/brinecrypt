apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "brinecrypt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: brinecrypt-tokenreview-{{ .Release.Name }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: brinecrypt-tokenreview-{{ .Release.Name }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: brinecrypt-tokenreview-{{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "brinecrypt.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: brinecrypt-configmap-watcher
  namespace: {{ include "brinecrypt.syncNamespace" . }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["brinecrypt-sa-permissions", "brinecrypt-admin-tokens"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: brinecrypt-configmap-watcher
  namespace: {{ include "brinecrypt.syncNamespace" . }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: brinecrypt-configmap-watcher
subjects:
  - kind: ServiceAccount
    name: {{ include "brinecrypt.fullname" . }}
    namespace: {{ .Release.Namespace }}
