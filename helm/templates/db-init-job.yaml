apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "brinecrypt.name" . }}-db-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:16-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              psql "$PGURL" -c "SELECT 1 FROM pg_database WHERE datname='brinecrypt'" | grep -q 1 \
                || psql "$PGURL" -c "CREATE DATABASE brinecrypt OWNER servarr;"
              psql "$PGURL" -c "GRANT ALL PRIVILEGES ON DATABASE brinecrypt TO servarr;"
          env:
            - name: PGURL
              value: {{ .Values.database.pgUrl | quote }}
