apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "brinecrypt.fullname" . }}-db-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "brinecrypt.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 4
  template:
    metadata:
      labels:
        {{- include "brinecrypt.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              psql "$PGURL" -c "SELECT 1 FROM pg_database WHERE datname='brinecrypt'" | grep -q 1 \
                || psql "$PGURL" -c "CREATE DATABASE brinecrypt OWNER servarr;"
              psql "$PGURL" -c "GRANT ALL PRIVILEGES ON DATABASE brinecrypt TO servarr;"
          env:
            - name: PGURL
              value: {{ required "values.database.pgUrl is required for db-init job" .Values.database.pgUrl | quote }}
