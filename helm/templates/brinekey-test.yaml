{{- if and .Values.brinekey.enabled .Values.brinekey.test.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.brinekey.test.namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.brinekey.test.serviceAccount }}
  namespace: {{ .Values.brinekey.test.namespace }}
---
apiVersion: brinekey.brinecrypt.io/v1alpha1
kind: BrinecryptSecret
metadata:
  name: brinekey-test
  namespace: {{ .Values.brinekey.test.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
spec:
  remotePath: {{ .Values.brinekey.test.resource | quote }}
  serviceAccount: {{ .Values.brinekey.test.serviceAccount | quote }}
  targetSecret: brinekey-test-secret
  secretKey: value
  refreshInterval: 1m
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "brinekey.name" . }}-smoke
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "brinekey.name" . }}-smoke
  namespace: {{ .Values.brinekey.test.namespace }}
rules:
  - apiGroups: ["brinekey.brinecrypt.io"]
    resources: ["brinecryptsecrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "brinekey.name" . }}-smoke
  namespace: {{ .Values.brinekey.test.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "brinekey.name" . }}-smoke
subjects:
  - kind: ServiceAccount
    name: {{ include "brinekey.name" . }}-smoke
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "brinekey.name" . }}-smoke
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: test
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "brinekey.name" . }}-smoke
      containers:
        - name: smoke
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eux
              READY=""
              for i in $(seq 1 60); do
                READY=$(kubectl -n {{ .Values.brinekey.test.namespace }} get brinecryptsecret brinekey-test -o jsonpath='{.status.ready}' || true)
                echo "attempt=$i ready=${READY}"
                if [ "$READY" = "true" ]; then break; fi
                sleep 2
              done
              kubectl -n {{ .Values.brinekey.test.namespace }} get brinecryptsecret brinekey-test -o yaml
              if [ "$READY" != "true" ]; then
                echo "BrinecryptSecret did not become ready in time"
                exit 1
              fi
              VALUE=$(kubectl -n {{ .Values.brinekey.test.namespace }} get secret brinekey-test-secret -o jsonpath='{.data.value}' | base64 -d)
              echo "Brinekey synced value: $VALUE"
{{- end }}
