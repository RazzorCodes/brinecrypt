name: Release Integration Tests

on:
  push:
    tags:
      - 'v*-intest'

jobs:
  integration-test:
    runs-on: arc-runner-set
    permissions:
      contents: write

    # Runner pod must use a k8s SA with write on ci/* in brinecrypt and
    # kubectl access to the homelab-sandbox namespace.

    steps:
      - uses: actions/checkout@v4

      - name: Fetch brinekey token and verify CI stamp
        run: |
          TOKEN=$(cat /var/run/secrets/brinekey/token)
          VERSION=${GITHUB_REF_NAME%-intest}
          VERSION=${VERSION#v}
          SHA=$(curl -sf -f -X POST "http://brinecrypt.kube-ex.svc:8080/api/v1/resource?op=query" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"namespace\":\"ci\",\"name\":\"brinecrypt-release-$VERSION\"}" \
            | jq -r '.value.data')
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "No stamped SHA for brinecrypt-release/$VERSION — branch pipeline must pass first."
            exit 1
          fi
          echo "RELEASE_SHA=$SHA" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: azure/setup-helm@v4

      - name: Deploy homelab-sandbox test environment
        run: |
          helm upgrade --install brinecrypt-sandbox ./helm \
            --namespace homelab-sandbox --create-namespace \
            --set image.repository=zot.kube-ex.svc.cluster.local:5000/brinecrypt \
            --set image.tag=${{ env.RELEASE_SHA }} \
            --set image.pullPolicy=IfNotPresent \
            --set database.url=postgres://user:pass@postgres.homelab-infra.svc.cluster.local:5432/brinecrypt_sandbox?sslmode=disable
          kubectl rollout status deployment -l app.kubernetes.io/instance=brinecrypt-sandbox \
            -n homelab-sandbox --timeout=120s

      - name: Run integration and e2e tests
        run: |
          # TODO: deploy and run test fleet against brinecrypt-sandbox
          echo "TODO: integration and e2e tests"

      - name: Tear down sandbox
        if: always()
        run: helm uninstall brinecrypt-sandbox --namespace homelab-sandbox --ignore-not-found

      - name: Promote to RC
        if: success()
        run: |
          GH_API="https://api.github.com/repos/${{ github.repository }}"
          curl -sf -f -X DELETE "$GH_API/git/refs/tags/v${{ env.VERSION }}-intest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28"
          curl -sf -f -X POST "$GH_API/git/refs" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/tags/v${{ env.VERSION }}-rc\",\"sha\":\"${{ env.RELEASE_SHA }}\"}"

      - name: Reset pipeline on failure
        if: failure()
        run: |
          curl -sf -X DELETE \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/v${{ env.VERSION }}-intest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" || true
