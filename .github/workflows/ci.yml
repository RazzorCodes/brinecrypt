name: CI

on:
  push:
    tags:
      - build-*

jobs:
  ci:
    runs-on: arc-runner-set

    # Runner pod must use a k8s SA registered in brinecrypt with write on ci/*.
    # Configure serviceAccountName in your ARC RunnerDeployment spec.
    # Workflow run status is the gate signal; trigger tags are orchestration inputs only.

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version context
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          case "$REF_NAME" in
            build-*) VERSION="${REF_NAME#build-}" ;;
            *)
              echo "Expected build-X.Y.Z tag but got '$REF_NAME'."
              exit 1
              ;;
          esac

          if [ -z "$VERSION" ]; then
            echo "Failed to parse build version from tag '$REF_NAME'."
            exit 1
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$VERSION'. Expected strict X.Y.Z."
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Wait for Docker
        run: until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Build and push image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f Dockerfile.prod \
            -t zot.kube-ex.svc.cluster.local:5000/brinecrypt:${{ github.sha }} \
            .
          docker push zot.kube-ex.svc.cluster.local:5000/brinecrypt:${{ github.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test ./...

      - name: Smoke tests
        run: echo "TODO"

      - name: Integration tests
        run: echo "TODO"

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ./helm

      - name: Stamp SHA to brinecrypt
        run: |
          TOKEN=$(cat /var/run/secrets/brinekey/token)
          curl -sf -f -X PUT http://brinecrypt.kube-ex.svc:8080/api/v1/resource \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"namespace\":\"ci\",\"name\":\"brinecrypt-ci-$VERSION\",\"type\":\"cleartext\",\"value\":\"${{ github.sha }}\"}"
