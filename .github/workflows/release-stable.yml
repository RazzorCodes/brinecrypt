name: Stable

on:
  push:
    tags:
      - stable-*
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version to publish (X.Y.Z); optional if ref already encodes it"
        required: false

jobs:
  stable:
    runs-on: arc-runner-set
    permissions:
      contents: write
      packages: write
    # Workflow run status is the gate signal; trigger tags are orchestration inputs only.

    steps:
      - uses: actions/checkout@v4

      - name: Resolve stable version context
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ]; then
            case "$REF_NAME" in
              stable-*) STABLE_VERSION="${REF_NAME#stable-}" ;;
              *)
                echo "Expected stable-X.Y.Z tag but got '$REF_NAME'."
                exit 1
                ;;
            esac
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            STABLE_VERSION="${INPUT_VERSION:-}"
            if [ -z "$STABLE_VERSION" ]; then
              STABLE_VERSION="$REF_NAME"
              STABLE_VERSION="${STABLE_VERSION#stable-}"
              STABLE_VERSION="${STABLE_VERSION#release/}"
              STABLE_VERSION="${STABLE_VERSION#v}"
            fi
          else
            echo "Unsupported event '$EVENT_NAME'."
            exit 1
          fi

          if ! [[ "$STABLE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable version '$STABLE_VERSION'. Expected strict X.Y.Z."
            exit 1
          fi

          echo "STABLE_VERSION=$STABLE_VERSION" >> "$GITHUB_ENV"

      - name: Verify release tag exists
        run: |
          set -euo pipefail
          curl -sf -f "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${STABLE_VERSION}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" >/dev/null

      - name: Wait for Docker
        run: until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Retag GHCR image as stable
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/$OWNER/brinecrypt:v${{ env.STABLE_VERSION }}
          docker tag  ghcr.io/$OWNER/brinecrypt:v${{ env.STABLE_VERSION }} ghcr.io/$OWNER/brinecrypt:stable
          docker push ghcr.io/$OWNER/brinecrypt:stable

      - name: Move stable git tag to selected release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          STABLE_SHA=$(git rev-list -n 1 "v$STABLE_VERSION")
          if [ -z "$STABLE_SHA" ]; then
            echo "Unable to resolve commit for v$STABLE_VERSION."
            exit 1
          fi
          git tag -f stable "$STABLE_SHA"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin refs/tags/stable
          echo "STABLE_SHA=$STABLE_SHA" >> "$GITHUB_ENV"

      - name: Create or update stable GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          target_commitish: ${{ env.STABLE_SHA }}
          name: stable
          body: |
            Stable currently points to v${{ env.STABLE_VERSION }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update stable pointer in brinecrypt
        run: |
          set -euo pipefail
          TOKEN=$(cat /var/run/secrets/brinekey/token)
          curl -sf -f -X PUT http://brinecrypt.kube-ex.svc:8080/api/v1/resource \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"namespace\":\"ci\",\"name\":\"brinecrypt-stable\",\"type\":\"cleartext\",\"value\":\"$STABLE_VERSION\"}"
