name: Release Branch

on:
  push:
    branches:
      - 'release/**'

jobs:
  build-and-test:
    runs-on: arc-runner-set
    permissions:
      contents: write

    # Runner pod must use a k8s SA registered in brinecrypt with write on ci/*.
    # Configure serviceAccountName in your ARC RunnerDeployment spec.

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Docker
        run: until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Build and push image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -f Dockerfile.prod \
            -t zot.kube-ex.svc.cluster.local:5000/brinecrypt:${{ github.sha }} \
            .
          docker push zot.kube-ex.svc.cluster.local:5000/brinecrypt:${{ github.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test ./...

      - name: Smoke tests
        run: echo "TODO"

      - name: Integration tests
        run: echo "TODO"

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ./helm

      - name: Stamp SHA to brinecrypt
        run: |
          TOKEN=$(cat /var/run/secrets/brinekey/token)
          VERSION=${GITHUB_REF_NAME#release/}
          curl -sf -f -X PUT http://brinecrypt.kube-ex.svc:8080/api/v1/resource \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"namespace\":\"ci\",\"name\":\"brinecrypt-release-$VERSION\",\"type\":\"cleartext\",\"value\":\"${{ github.sha }}\"}"

      - name: Tag as intest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#release/}
          gh api repos/${{ github.repository }}/git/refs \
            -X POST \
            -f ref="refs/tags/v${VERSION}-intest" \
            -f sha="${{ github.sha }}"
