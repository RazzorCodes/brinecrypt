name: Release Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: arc-runner-set
    permissions:
      contents: write
      packages: write

    steps:
      - name: Fetch SHA from brinecrypt
        run: |
          TOKEN=$(cat /var/run/secrets/brinekey/token)
          VERSION=${GITHUB_REF_NAME#v}
          SHA=$(curl -sf -f -X POST "http://brinecrypt.kube-ex.svc:8080/api/v1/resource?op=query" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"namespace\":\"ci\",\"name\":\"release-$VERSION\"}" \
            | jq -r '.value.data')
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "No stamped SHA for release/$VERSION — branch pipeline must pass first."
            exit 1
          fi
          echo "RELEASE_SHA=$SHA" >> $GITHUB_ENV

      - name: Wait for Docker
        run: until docker info >/dev/null 2>&1; do sleep 1; done

      - name: Retag image
        run: |
          REG=zot.kube-ex.svc.cluster.local:5000
          docker pull $REG/brinecrypt:${{ env.RELEASE_SHA }}
          docker tag  $REG/brinecrypt:${{ env.RELEASE_SHA }} $REG/brinecrypt:${{ github.ref_name }}
          docker push $REG/brinecrypt:${{ github.ref_name }}

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          REG=zot.kube-ex.svc.cluster.local:5000
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker tag $REG/brinecrypt:${{ env.RELEASE_SHA }} ghcr.io/$OWNER/brinecrypt:${{ github.ref_name }}
          docker tag $REG/brinecrypt:${{ env.RELEASE_SHA }} ghcr.io/$OWNER/brinecrypt:latest
          docker push ghcr.io/$OWNER/brinecrypt:${{ github.ref_name }}
          docker push ghcr.io/$OWNER/brinecrypt:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
